<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeMur · Proyecto TAO — Acceso</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png">
<script>
  (function() {
    try {
      var stored = localStorage.getItem('tao-informe-theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored || (prefersDark ? 'dark' : 'light');
      if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    } catch (e) {}
  })();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #0a0a0a;
    --bg: #FAFAF7;
    --gray-50: #FAFAF7;
    --gray-75: #F2F1EC;
    --gray-100: #ECEAE2;
    --gray-150: #E2E0D6;
    --gray-200: #D6D3C7;
    --gray-300: #BDB9A9;
    --gray-400: #8E8B7C;
    --gray-500: #6B695D;
    --gray-600: #4A4943;
    --gray-700: #2E2E2A;
    --gray-800: #1F1F1C;
    --red: #dc2626;
    --green: #16a34a;
    --amber: #d97706;
  }

  :root[data-theme="dark"] {
    --black: #FAFAF7;
    --bg: #16140F;
    --gray-50: #16140F;
    --gray-75: #1C1A15;
    --gray-100: #221F1A;
    --gray-150: #2A2722;
    --gray-200: #353128;
    --gray-300: #4A4640;
    --gray-400: #6B695D;
    --gray-500: #8E8B7C;
    --gray-600: #BDB9A9;
    --gray-700: #D6D3C7;
    --gray-800: #F2F1EC;
    --red: #f87171;
    --green: #4ade80;
    --amber: #fbbf24;
  }
  body, .login-panel, .login-btn, .field input {
    transition: background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease;
  }

  /* Theme toggle */
  .theme-toggle {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--gray-300);
    color: var(--gray-700);
    cursor: pointer;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    z-index: 10;
    font-family: inherit;
  }
  .theme-toggle:hover {
    border-color: var(--gray-700);
    background: var(--gray-100);
  }
  .theme-toggle svg { width: 16px; height: 16px; }
  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }
  :root[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
  :root[data-theme="dark"] .theme-toggle .icon-moon { display: none; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--black);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .login-wrap {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 420px;
    height: 100vh;
    width: 100vw;
  }

  .login-video {
    position: relative;
    overflow: hidden;
    background: var(--gray-700);
  }
  .login-video video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .mute-btn {
    position: absolute;
    bottom: 24px;
    left: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(10, 10, 10, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #FAFAF7;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .mute-btn:hover { background: rgba(10, 10, 10, 0.75); }
  .mute-btn:active { transform: scale(0.95); }
  .mute-btn svg { width: 20px; height: 20px; display: block; }
  .mute-btn .icon-unmute { display: none; }
  .mute-btn.is-on .icon-mute { display: none; }
  .mute-btn.is-on .icon-unmute { display: block; }

  .login-panel {
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    overflow-y: auto;
  }

  .login-inner {
    width: 100%;
    max-width: 420px;
  }

  .login-meta {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gray-500);
    margin-bottom: 18px;
  }

  .login-title {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -1.5px;
    line-height: 1.05;
    color: var(--black);
    margin-bottom: 16px;
  }

  .login-desc {
    font-size: 16px;
    color: var(--gray-600);
    font-weight: 300;
    line-height: 1.55;
    margin-bottom: 40px;
    max-width: 380px;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .field label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray-500);
    font-weight: 500;
  }
  .field input {
    font-family: inherit;
    font-size: 16px;
    color: var(--black);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--gray-300);
    padding: 10px 0;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .field input:focus {
    border-bottom: 2px solid var(--black);
    padding-bottom: 9px;
  }
  .field input::placeholder {
    color: var(--gray-300);
    font-weight: 300;
  }

  .login-btn {
    margin-top: 14px;
    width: 100%;
    background: var(--black);
    color: var(--bg);
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 18px 24px;
    border: none;
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 16px rgba(46, 46, 42, 0.08);
  }
  .login-btn:hover {
    box-shadow: 0 6px 20px rgba(46, 46, 42, 0.18);
  }
  .login-btn:active {
    transform: translateY(1px);
  }

  .login-error {
    margin-top: 18px;
    font-size: 13px;
    color: var(--red);
    letter-spacing: 0.5px;
    display: none;
  }
  .login-error.show { display: block; }

  .login-foot {
    margin-top: 48px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray-400);
  }

  @media (max-width: 768px) {
    html, body { overflow: auto; }
    .login-wrap {
      grid-template-columns: 1fr;
      grid-template-rows: 40vh 1fr;
      height: auto;
      min-height: 100vh;
    }
    .login-panel { padding: 40px 28px; }
    .login-title { font-size: 34px; }
    .mute-btn { bottom: 16px; left: 16px; width: 40px; height: 40px; }
  }
</style>
</head>
<body>

<div class="login-wrap">

  <div class="login-video">
    <video id="bg-video" autoplay muted loop playsinline>
      <source src="docs/tao.mp4" type="video/mp4">
    </video>
    <button type="button" class="mute-btn" id="mute-btn" aria-label="Activar sonido" title="Activar sonido">
      <svg class="icon-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M11 5 6 9H2v6h4l5 4z"></path>
        <line x1="22" y1="9" x2="16" y2="15"></line>
        <line x1="16" y1="9" x2="22" y2="15"></line>
      </svg>
      <svg class="icon-unmute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M11 5 6 9H2v6h4l5 4z"></path>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      </svg>
    </button>
  </div>

  <div class="login-panel" style="position:relative;">
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Cambiar tema">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="4"/>
        <line x1="12" y1="20" x2="12" y2="22"/>
        <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/>
        <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/>
        <line x1="2" y1="12" x2="4" y2="12"/>
        <line x1="20" y1="12" x2="22" y2="12"/>
        <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/>
        <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>
      </svg>
    </button>
    <div class="login-inner">
      <p class="login-meta">DE MUR &middot; ELEVANDO FUTURO</p>
      <h1 class="login-title">Acceso al informe</h1>
      <p class="login-desc">Documento confidencial. Ingres&aacute; tus credenciales para acceder.</p>

      <form class="login-form" id="login-form" autocomplete="off">
        <div class="field">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Contrase&ntilde;a</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn">Ingresar</button>
        <p class="login-error" id="login-error">Credenciales incorrectas.</p>
      </form>

      <p class="login-foot">Proyecto TAO &middot; Informe de estado integral</p>
    </div>
  </div>

</div>

<script>
  (function() {
    var form = document.getElementById('login-form');
    var errorEl = document.getElementById('login-error');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var u = document.getElementById('usuario').value.trim();
      var p = document.getElementById('password').value;

      if (u === 'demur' && p === 'tao2026') {
        sessionStorage.setItem('demur_auth', '1');
        window.location.href = 'index.html';
      } else {
        errorEl.classList.add('show');
      }
    });

    ['usuario', 'password'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', function() {
        errorEl.classList.remove('show');
      });
    });

    var themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
      themeToggle.addEventListener('click', function() {
        var root = document.documentElement;
        var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        if (next === 'dark') root.setAttribute('data-theme', 'dark');
        else root.removeAttribute('data-theme');
        try { localStorage.setItem('tao-informe-theme', next); } catch (e) {}
      });
    }

    var video = document.getElementById('bg-video');
    var muteBtn = document.getElementById('mute-btn');
    muteBtn.addEventListener('click', function() {
      video.muted = !video.muted;
      if (!video.muted) {
        muteBtn.classList.add('is-on');
        muteBtn.setAttribute('aria-label', 'Silenciar');
        muteBtn.setAttribute('title', 'Silenciar');
        var p = video.play();
        if (p && typeof p.catch === 'function') p.catch(function(){});
      } else {
        muteBtn.classList.remove('is-on');
        muteBtn.setAttribute('aria-label', 'Activar sonido');
        muteBtn.setAttribute('title', 'Activar sonido');
      }
    });
  })();
</script>

</body>
</html>
